apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nginx
          mountPath: /usr/share/nginx/html
  volumes:
    - name: nginx
      hostPath:
        path: /data/nginx
        type: DirectoryOrCreate
